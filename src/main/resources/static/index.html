<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Command Center</title>
    <style>
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #0f172a); color: #0f172a;
        }
        .card {
            background: #fff; border-radius: 18px; padding: 44px 48px; max-width: 480px; text-align: center;
            box-shadow: 0 30px 60px -25px rgba(0,0,0,.45);
        }
        .logo { font-size: 46px; }
        h1 { margin: 12px 0 6px; font-size: 26px; }
        p { margin: 0; color: #64748b; font-size: 15px; }
        .ok { margin-top: 22px; display: inline-block; background: #dcfce7; color: #15803d;
              font-weight: 700; font-size: 13px; padding: 7px 16px; border-radius: 999px; }
        .hint { margin-top: 18px; font-size: 13px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🚀</div>
        <h1>Welcome to your Business Command Center</h1>
        <p>Your starter app is running. You'll make this your own — one module at a time.</p>
        <span class="ok">✓ It works! Your app is running on the web.</span>
        <p class="hint">Next: pick your business theme and start building with your AI agent.</p>
    </div>
</body>
</html>
